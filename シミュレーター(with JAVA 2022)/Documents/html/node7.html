<H2><A NAME="SECTION00133000000000000000">
描画メニュー</A>
</H2>
描画メニューではFig.<A HREF="#fig:anim">A.11</A>に示すように，次のような機能
を持っている．
<DL>
<DT><STRONG>アニメーションの作成</STRONG></DT>
<DD>これを選択すると，シミュレーション結果を動画の形で見ることが
	    できる．
 
</DD>
<DT><STRONG>スナップショットの作成</STRONG></DT>
<DD>これを選択すると，シミュレーション結果の軌跡がアニメーション
	    速度変更ウィンドウで選択された間隔で描かれる．
</DD>
</DL>
