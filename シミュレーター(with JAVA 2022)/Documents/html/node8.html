<H2><A NAME="SECTION00134000000000000000">
グラフメニュー</A>
</H2>
グラフメニューではFig.<A HREF="#fig:graph">A.12</A>に示すように，次のような機能を持っ
ている．
<DL>
<DT><STRONG>グラフ選択</STRONG></DT>
<DD>これを選択すると，Fig.<A HREF="#fig:setplot">A.13</A>に示すような新しいウィ
	    ンドウが開き，2Dプロットで描画したい時系列データを選択するこ
	    とができる．三輪車のシミュレーション実行時とトレーラーのシミュ
	    レーション実行時では選択できる変数が異なる．
	    データは複数選択可能である．
</DD>
</DL>
