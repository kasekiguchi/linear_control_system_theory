<H1><A NAME="SECTION006230000000000000000">
式の値を保存する変数<TT>ans</TT></A>
</H1>
<A NAME="1976">&#160;</A>
式の評価結果が変数に代入されない場合，その値は変数<TT>ans</TT>に
保存される。以下に例を示す。
<BR CLEAR="ALL">
<HR><PRE>
 MaTX (1) 1 + 2 + 3
 ans = 6
 MaTX (2) ans*ans
 ans = 36
 MaTX (3) sqrt(ans)
 ans = 6
</PRE>
