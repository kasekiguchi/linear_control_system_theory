<H1><A NAME="SECTION00650000000000000000">
登録変数の表示(matxのみ)</A>
</H1>
<A NAME="1934">&#160;</A>
<A NAME="1935">&#160;</A>
<A NAME="1436">&#160;</A>
登録されている変数を表示するには<TT>who</TT>コマンドを使用する。
<BR CLEAR="ALL">
<HR><PRE>
  who
</PRE>
<BR CLEAR="ALL">
<HR>登録されている変数の詳しい情報を表示するには<TT>whos</TT>コマンドを使用する。
変数を指定しないと，登録されている全ての変数の情報が表示される。
<BR CLEAR="ALL">
<HR><PRE>
  whos
  whos a, b, A, B
</PRE>
<BR CLEAR="ALL">
<HR>
