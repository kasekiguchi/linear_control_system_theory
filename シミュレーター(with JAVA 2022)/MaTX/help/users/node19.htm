<H1><A NAME="SECTION00610000000000000000">
画面に表示</A>
</H1>
<A NAME="1926">&#160;</A>
値を表示するには，クラスの区別なく<TT>print</TT>コマンドを使用する。
コンマで区切ることにより，複数の値を同時に指定できる。
<BR CLEAR="ALL">
<HR><PRE>
  print 1, 1.0, (1,2), "Hello", [[1 2][3 4]]
</PRE>
