<H1><A NAME="SECTION00620000000000000000">
キーボードからの入力と編集</A>
</H1>
<A NAME="1927">&#160;</A>
値を入力・編集するには，クラスの区別なく<TT>read</TT>コマンドを使用する。
コンマで区切ることにより，複数の値を同時に指定できる。
行列を入力・編集する時は，<B>行列エディタ</B>が起動される。
<A NAME="1400">&#160;</A>
<BR CLEAR="ALL">
<HR><PRE>
  read a, b, A, B
</PRE>
