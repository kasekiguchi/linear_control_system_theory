<H1><A NAME="SECTION001530000000000000000">
文字列の比較</A>
</H1><FONT SIZE="-1">
関係演算子 <TT>==</TT>, <TT>!=</TT> を使って，2つの文字列を比較することができ，
結果は，1(真)または0(偽)となる。
</FONT>
<P>
<DIV ALIGN="CENTER"><TABLE CELLPADDING=3 BORDER="1">
<TR><TD ALIGN="CENTER" COLSPAN=1>表 記</TD>
<TD ALIGN="CENTER" COLSPAN=1>意 味</TD>
</TR>
<TR><TD ALIGN="LEFT">文字列1 == 文字列2</TD>
<TD ALIGN="LEFT">文字列1と文字列2は等しい</TD>
</TR>
<TR><TD ALIGN="LEFT">文字列1 != 文字列2</TD>
<TD ALIGN="LEFT">文字列1と文字列2は等しくない</TD>
</TR>
</TABLE></DIV>
