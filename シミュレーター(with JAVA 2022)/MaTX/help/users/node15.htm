<H1><A NAME="SECTION00560000000000000000">
<I>mated</I>を用いた行列の入力・編集</A>
</H1>
<A NAME="934">&#160;</A>
<A NAME="850">&#160;</A>
行列エディタ(<I>mated</I>)を用いて，あらかじめプログラムで使う行列を入力して
ファイルに保存しておくことができる。
<BR CLEAR="ALL">
<HR><PRE>
% mated A.mat B.mat C.mat
</PRE>
