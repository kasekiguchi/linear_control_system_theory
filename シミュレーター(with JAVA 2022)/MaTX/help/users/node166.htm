<H2><A NAME="SECTION001843000000000000000">&#160;</A>

<BR>
有理多項式行列の微分
</H2><FONT SIZE="-1">
<A NAME="9024">&#160;</A>
有理多項式行列の微分は，関数<TT>derivative()</TT>を用いる。
有理多項式行列の積分は，今のところ用意されていない。
第2引数に求める導関数の階数を指定するが，階数を省略すると1階の導関数を求める。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
CRM2 = derivative(CRM1);    // CRM1の1階導関数
CRM3 = derivative(CRM1,2);  // CRM1の2階導関数
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT>
