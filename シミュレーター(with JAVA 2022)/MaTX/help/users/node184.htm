<H1><A NAME="SECTION001900000000000000000">&#160;</A>
<A NAME="10552">&#160;</A>
<BR>
リスト
</H1>
<P>
<FONT SIZE="-1">リストは，任意のクラスの値を成分として持つことができる1次元配列である。
リストを利用して，複数個の戻り値を同時に返す関数を定義することができる。
</FONT>
<P>
<FONT SIZE="-1">［宣言］
</FONT><PRE>
  List a, b, c;
</PRE>
<P>
<FONT SIZE="-1">［例］
</FONT><PRE>
  {4, (3,4), [1 2]}, {"Hello", s+1, (s+1)/(s+2)}
</PRE>
