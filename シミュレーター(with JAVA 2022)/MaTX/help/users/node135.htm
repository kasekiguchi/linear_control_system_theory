<H1><A NAME="SECTION001710000000000000000">
有理多項式の記述方法</A>
</H1><FONT SIZE="-1">
有理多項式は多項式の割算として記述する。
出力される有理多項式の変数名は，常に <TT>s</TT> である。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
  s = $;
  R1 = (s + 2)/(2*s + 3);        // 1次の実有理多項式
  CR1 = (1,2)/((3,4)*s + (5,6)); // 1次の複素有理多項式
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT>
