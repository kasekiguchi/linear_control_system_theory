<H1><A NAME="SECTION006140000000000000000">
現在の日付と時間</A>
</H1>
<A NAME="1949">&#160;</A>
関数<TT>clock()</TT>は現在の日付と時間を含む6成分からなる行ベクトル返す。
<PRE>
  [year month day hour minute seconds]
</PRE>
<BR CLEAR="ALL">
<HR><PRE>
  date_time = clock();
</PRE>
<BR CLEAR="ALL">
<HR>最初の 5 個の成分は整数であり，最後の<TT>seconds</TT>は正確な実数である。
<BR><HR>
