<H1><A NAME="SECTION00740000000000000000">
プロセスの終端の検出</A>
</H1><FONT SIZE="-1">
<A NAME="3002">&#160;</A>
<TT>fopen()</TT>によってオープンしたファイルからデータを読み込むとき，
ファイルの終端を検出したいことがある。C言語と同様に関数<TT>feof()</TT>
によって，それを検出できる。関数<TT>feof()</TT>に調べたいファイル
のディスクリプタを指定すると，ファイルの終端に達していれば，</FONT>1<FONT SIZE="-1">を，
終端に達していなければ</FONT>0<FONT SIZE="-1">を，ファイルがオープンされていなければ</FONT>-1<FONT SIZE="-1">を
返す。
</FONT>
