<H1><A NAME="SECTION006250000000000000000">&#160;</A>
<A NAME="1740">&#160;</A>
<BR>
コメント
</H1>
<A NAME="1979">&#160;</A><A NAME="1980">&#160;</A>
``<TT>/*</TT>''と``<TT>*/</TT>''の間にある文章と
``<TT>//</TT>''から行末までの文章は，
インタプリタ(matx)とコンパイラ(matc)の両者に無視される。

<P>
したがって，コメントはプログラムを理解しやすくするために
自由に使うことができる。
コメントを入れる場合は，空白(blank)あるいは改行が書けるところならどこでもよい。
ただし，``<TT>/*</TT>''と``<TT>*/</TT>''によるコメントの入れ子(ネスティング)
は許されない。
