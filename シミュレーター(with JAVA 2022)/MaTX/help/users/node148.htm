<H2><A NAME="SECTION001813000000000000000">&#160;</A>
<A NAME="7934">&#160;</A>
<BR>
列ベクトル
</H2><FONT SIZE="-1">
転置を意味する" <B>'</B> "を用いて列ベクトルを記述する。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
M1 = [1 2 3]';         // スペースで区切る
M1 = [1 2 , -3]';      // -単項演算子をカンマで区切る
M1 = [1 2 (-3) ]';     // -単項演算子を括弧で囲む
CM1 = [(1,2), (3,4)]'; // 複素列ベクトル
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
