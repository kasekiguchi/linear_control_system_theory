<H1><A NAME="SECTION001670000000000000000">
多項式の比較</A>
</H1><FONT SIZE="-1">
関係演算子 <TT>==</TT>と<TT>!=</TT> を使って，つの多項式を比較することができ，
結果は，1(真)または0(偽)となる。
</FONT>
<P>
<DIV ALIGN="CENTER"><TABLE CELLPADDING=3 BORDER="1">
<TR><TD ALIGN="CENTER" COLSPAN=1>表 記</TD>
<TD ALIGN="CENTER" COLSPAN=1>意 味</TD>
</TR>
<TR><TD ALIGN="LEFT">P1 == P2</TD>
<TD ALIGN="LEFT">多項式P1とP2は等しい</TD>
</TR>
<TR><TD ALIGN="LEFT">P1 != P2</TD>
<TD ALIGN="LEFT">多項式P1とP2は等しくない</TD>
</TR>
</TABLE></DIV>
