<BR>
整数定数
</H1><FONT SIZE="-1">
整数型の定数である。数字の<TT>0</TT>(ゼロ)以外の数字で始まる数字の列は
<B>10進数</B>を表す。<TT>0</TT>または<TT>0</TT>で始まる数字の列は
<B>8進数</B>を，数字のゼロとエックス<TT>0x</TT>または<TT>0X</TT>で始まる
数字の列は<B>16進数</B>を表す。
</FONT>
<P>
<FONT SIZE="-1">［例］
</FONT><PRE>
    010(8),  0100(64),    0xA(10),
  0x10(16),  0x1c(28),  0xff(255)
</PRE>
<P>
