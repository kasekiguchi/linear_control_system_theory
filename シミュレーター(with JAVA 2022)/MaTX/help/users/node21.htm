<H1><A NAME="SECTION00630000000000000000">
入出力</A>
</H1>
C 言語と同様にデータを画面に書式を指定して出力(<TT>printf()</TT>)したり
データをキーボードから読み込む(<TT>scanf()</TT>)ことができる。
<A NAME="1928">&#160;</A>
<A NAME="1929">&#160;</A>
入出力の例を次に示す。
<BR CLEAR="ALL">
<HR><PRE>
  printf("%d %lf %s", 10, 3.1415, "Hello")

  {a, b, c} = scanf("%d %lf %s")
  print a, b, c
</PRE>
