<H1><A NAME="SECTION001780000000000000000">
有理多項式の比較</A>
</H1><FONT SIZE="-1">
関係演算子 <TT>==</TT>, <TT>!=</TT> を使って，2つの有理多項式を
比較することができ，結果は1(真)または0(偽)となる。
</FONT>
<P>
<DIV ALIGN="CENTER"><TABLE CELLPADDING=3 BORDER="1">
<TR><TD ALIGN="CENTER" COLSPAN=1>表 記</TD>
<TD ALIGN="CENTER" COLSPAN=1>意 味</TD>
</TR>
<TR><TD ALIGN="LEFT">R1 == R2</TD>
<TD ALIGN="LEFT">有理多項式R1とR2は等しい</TD>
</TR>
<TR><TD ALIGN="LEFT">R1 != R2</TD>
<TD ALIGN="LEFT">有理多項式R1とR2は等しくない</TD>
</TR>
</TABLE></DIV>
