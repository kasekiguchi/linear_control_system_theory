<H1><A NAME="SECTION001420000000000000000">
複素数の比較</A>
</H1><FONT SIZE="-1">
関係演算子 <TT>==</TT>, <TT>!=</TT> を使って，2つの複素数を比較することができ，
結果は，1(真)または0(偽)となる。
</FONT>
<P>
<DIV ALIGN="CENTER"><TABLE CELLPADDING=3 BORDER="1">
<TR><TD ALIGN="CENTER" COLSPAN=1>表 記</TD>
<TD ALIGN="CENTER" COLSPAN=1>意 味</TD>
</TR>
<TR><TD ALIGN="LEFT">c1 == c2</TD>
<TD ALIGN="LEFT">複素数c1と複素数c2は等しい</TD>
</TR>
<TR><TD ALIGN="LEFT">c1 != c2</TD>
<TD ALIGN="LEFT">複素数c1と複素数c2は等しくない</TD>
</TR>
</TABLE></DIV>
