<H2><A NAME="SECTION001827000000000000000">
行列を成分とする行列</A>
</H2><FONT SIZE="-1">
行列の式を行列の成分として用いることができる。
ただし，それぞれの式の計算結果の行列の大きさは，
行列の成分として適当でなければならない。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
M1 = [[1 2][3 4]];  M2 = [5 6]';  M3 = [7 8];
M4 = [9];  M5 = [[1 0][0 1]];  M6 = [1];

M7 = [[ M1  , -M2*M6¥M2#]
      [-M5  , -M1#      ]];
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT>
