<H1><A NAME="SECTION00680000000000000000">
環境変数の設定と取得</A>
</H1>
<A NAME="1939">&#160;</A>
<A NAME="1940">&#160;</A>
環境変数を取得には，関数<TT>getenv()</TT>を使用し，
環境変数を設定するには，関数<TT>putenv()</TT>を使用する。
<BR CLEAR="ALL">
<HR><PRE>
  putenv("DISPLAY=dazai:0.0");
  disp = getenv("DISPLAY");
</PRE>
