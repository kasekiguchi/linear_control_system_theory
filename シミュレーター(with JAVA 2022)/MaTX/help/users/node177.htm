<H2><A NAME="SECTION001858000000000000000">
行列の大きさの変更</A>
</H2><FONT SIZE="-1">
<A NAME="9037">&#160;</A>
行列の大きさは，関数<TT>reshape()</TT>を使って変更することができる。
だだし，変更前の行列の成分の数と変更後の行列の成分の数は，等しく
なければならない。行列の成分は，左から右へ，上から下へ，並べられる。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
M1 = reshape([1 2 3 4], 2, 2); // M1 = [[1 2][3 4]]
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT>
