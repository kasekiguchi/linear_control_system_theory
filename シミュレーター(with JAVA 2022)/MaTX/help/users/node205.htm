<H1><A NAME="SECTION002400000000000000000">
メモリ管理</A>
</H1><FONT SIZE="-1">

この節では，クラスライブラリMaTX-Libのメモリ管理機構について述べる。
行列クラス，多項式クラス，有理多項式クラス，リストクラスは別々にメモリを管理
しているが，全て同じ方式なので，ここでは行列クラスについて説明する。
