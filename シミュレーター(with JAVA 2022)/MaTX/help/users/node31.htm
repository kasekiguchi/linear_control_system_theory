<H1><A NAME="SECTION006130000000000000000">
時間の計測</A>
</H1>
<A NAME="1947">&#160;</A>
<A NAME="1948">&#160;</A>
関数<TT>settimer()</TT>でインターバルタイマの値をリセットし，
関数<TT>gettimer()</TT>を呼び出すと，その間の時間(秒数)を1 ms単位
で計測できる。UNIXではプロセスのCPU時間が，WindowsとDOSでは
実行時間が計測される。
<BR CLEAR="ALL">
<HR><PRE>
  settimer();
  for (i = 1; i &lt;= 100; i++) {
    A = rand(100);
  }
  print gettimer();
</PRE>
