<H1><A NAME="SECTION006100000000000000000">
OSのコマンドを実行する</A>
</H1>
<A NAME="1942">&#160;</A>
<A NAME="1943">&#160;</A>
<A NAME="1502">&#160;</A><A NAME="1503">&#160;</A>
OSのコマンドを実行するには，関数<TT>system()</TT>を使用する。
この関数はOSからの終了コードを返す。シェルが実行できた場合は0が返される。
インタプリタ(<I>matx</I>)では，コマンドラインの先頭を <TT>!</TT> で始める
と，その行はそのままシェルに渡される。
<BR CLEAR="ALL">
<HR><PRE>
  system("xplot -silent A.mat");
   ! ls *.c
   ! pwd
</PRE>
