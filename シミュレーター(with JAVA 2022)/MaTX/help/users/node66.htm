<H1><A NAME="SECTION00830000000000000000">
キーバインディング</A>
</H1><FONT SIZE="-1">
記号 <code>^</code> は，</FONT>
<!-- MATH: $¥fbox{¥tt Ctrl}$ -->
<IMG
 WIDTH="45" HEIGHT="21" ALIGN="BOTTOM" BORDER="0"
 SRC="img6.gif"
 ALT="¥fbox{¥tt Ctrl}"><FONT SIZE="-1">キーを押しながら続く文字を
同時に押すことを表す。
例えば， <code>^</code>C は，</FONT>
<!-- MATH: $¥fbox{¥tt Ctrl}$ -->
<IMG
 WIDTH="45" HEIGHT="21" ALIGN="BOTTOM" BORDER="0"
 SRC="img6.gif"
 ALT="¥fbox{¥tt Ctrl}"><FONT SIZE="-1">キーを押したまま
</FONT>
<!-- MATH: $¥fbox{¥tt C}$ -->
<IMG
 WIDTH="20" HEIGHT="21" ALIGN="BOTTOM" BORDER="0"
 SRC="img7.gif"
 ALT="¥fbox{¥tt C}"><FONT SIZE="-1">キーを同時に押すことを意味する。
領域のコピーを行なうには，まず，コピーしたい領域の左上に移動して
マークを付ける。次に，領域の右下に移動して領域の獲得を行ない，
最後にコピー先の左上に移動してペーストする。
<A NAME="3467">&#160;</A>
</FONT>
