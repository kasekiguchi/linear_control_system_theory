有理多項式の分子多項式と分母多項式
</H1><FONT SIZE="-1">
<A NAME="7423">&#160;</A>
<A NAME="7424">&#160;</A>
有理多項式の分子多項式と分母多項式は，
関数<TT>Nu()</TT>と<TT>De()</TT>を用いて取り出すことができる。</FONT><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT><PRE>
  P1 = Nu(P1 / P2);  // 分子多項式 = Nu(有理多項式)
  P2 = De(P1 / P2);  // 分母多項式 = De(有理多項式)
</PRE><FONT SIZE="-1">
<BR CLEAR="ALL">
<HR></FONT>
