<H1><A NAME="SECTION006190000000000000000">&#160;</A>
<A NAME="1597">&#160;</A>
<BR>
終了
</H1>
<A NAME="1954">&#160;</A><A NAME="1955">&#160;</A>
インタプリタ(<I>matx</I>)を終了するには<TT>quit</TT>コマンドを使用する。
関数の実行中に<TT>exit()</TT>が呼ばれると，関数の実行が中断され
コマンドラインに戻る。<I>matc</I>が生成した実行プログラムでは，
<TT>exit()</TT>が呼ばれるとプログラムが終了し，引数がシェルに渡される。
<BR CLEAR="ALL">
<HR><PRE>
  quit;
  exit;
  exit(-1);
</PRE>
