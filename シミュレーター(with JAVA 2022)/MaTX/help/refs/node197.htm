<H2><A NAME="SECTION0004193000000000000000">&#160;</A><A NAME="man_rtStart">&#160;</A>
<BR>
rtStart
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>rtStart - リアルタイム処理の開始
<DT>【形式】
<DD><PRE>
rtStart()
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>rtStart()は，リアルタイム処理を開始する。rtSetTask()で登録された
関数がサンプリング時間毎に実行される。
<DT>【例題】
<DD></FONT><PRE>
rtStart();
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
