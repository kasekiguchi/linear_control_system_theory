<H2><A NAME="SECTION0004165000000000000000">&#160;</A><A NAME="man_quit">&#160;</A>
<BR>
quit
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>quit - インタプリタを終了する
<DT>【形式】
<DD><PRE>
quit;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>インタプリタのコマンドラインで quit を入力すると，インタプリタ
が終了する。quit は，インタプリタのみで使用できる。
<DT>【例題】
<DD></FONT><PRE>
quit
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
