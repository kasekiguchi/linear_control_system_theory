<H2><A NAME="SECTION0004192000000000000000">&#160;</A><A NAME="man_rtSetTask">&#160;</A>
<BR>
rtSetTask
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>rtSetTask - オンラインタスクの設定
<DT>【形式】
<DD><PRE>
rtSetTask(on_task)
   void on_task();
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>rtSetTask(on_task)は，on_task()をサンプリング時間毎に実行
される関数として登録する。
<DT>【例題】
<DD></FONT><PRE>
rtSetTask(on_task);
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
