<H2><A NAME="SECTION000428000000000000000">&#160;</A><A NAME="man_chdir">&#160;</A>
<BR>
chdir
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>chdir - ディレクトリを変更する
<DT>【形式】
<DD><PRE>
chdir dir;
   String dir
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>chdir dir は，作業ディレクトリを dir に変更する。ただし，
文字列中の <code>¥</code>t や <code>¥</code>n などは特殊文字として解釈されるので，
Windowsでは逆スラッシュ <code>¥</code> を重ねる必要がある。
<DT>【例題】
<DD></FONT><PRE>
chdir "/usr/local/tmp";
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
<DD></FONT></FONT>
