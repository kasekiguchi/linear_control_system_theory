<H2><A NAME="SECTION0004146000000000000000">&#160;</A><A NAME="man_OdeStop">&#160;</A>

OdeStop
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>OdeStop - 常微分方程式を解く関数を停止する
<DT>【形式】
<DD><PRE>
OdeStop()
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>OdeStop()は，常微分方程式を解く関数の実行を停止する。各関数は
それまでに計算した結果を返す。
<DT>【例題】
<DD></FONT><PRE>
