<H2><A NAME="SECTION000460000000000000000">&#160;</A><A NAME="man_fact">&#160;</A>
<BR>
fact
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>fact - 階乗
<DT>【形式】
<DD><PRE>
y = fact(x)
   (Integer|Real) y;
   (Integer|Real) x;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>fact(x)は，階乗 x! を求める。
<DT>【例題】
<DD></FONT><PRE>
&gt;&gt; y = fact(5)
y = 120 (= 5*4*3*2*1)
&gt;&gt; y = fact(5.1)
y = 149.737 (= 5.1*4.1*3.1*2.1*1.1)
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
<DD></FONT></FONT>
