<H2><A NAME="SECTION000494000000000000000">&#160;</A><A NAME="man_infnorm">&#160;</A>
<BR>
infnorm
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>infnorm - 無限大ノルム
<DT>【形式】
<DD><PRE>
k = infnorm(A)
   Real k;
   Matrix A;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>infnorm(A)は，行列 A の無限大ノルム(行毎の和の最大値)を求める。
<DT>【例題】
<DD></FONT><PRE>
&gt;&gt; k = infnorm([[1 2 3][4 5 6]])
k = 15
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
