<H2><A NAME="SECTION000445000000000000000">&#160;</A><A NAME="man_degree">&#160;</A>
<BR>
degree
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>degree - 多項式の次数
<DT>【形式】
<DD><PRE>
m = degree(p)
   Integer m;
   Polynomial p;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>degree(p)は，多項式 p の次数を返す。
<DT>【例題】
<DD></FONT><PRE>
&gt;&gt; s = Polynomial("s");
&gt;&gt; p = s^3 + 2*s^2 + 3*s + 4;
&gt;&gt; m = degree(p)
m = 3
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
