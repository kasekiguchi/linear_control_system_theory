<H2><A NAME="SECTION000495000000000000000">&#160;</A><A NAME="man_Inport">&#160;</A>
<BR>
Inport
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>Inport - IOポートから 1 ワード読み込む
<DT>【形式】
<DD><PRE>
y = Inport(i)
   Integer y;
   Integer i;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>Inport(i)は，</FONT><FONT SIZE="-1">IOポート i から 1 ワードのデータを
読み込み，整数として返す。
<DT>【例題】
<DD></FONT><PRE>
&gt;&gt; d = Inport(0x10);
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
