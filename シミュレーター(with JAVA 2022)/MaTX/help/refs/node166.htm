<H2><A NAME="SECTION0004162000000000000000">&#160;</A><A NAME="man_putenv">&#160;</A>
<BR>
putenv
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>putenv - 環境変数の設定
<DT>【形式】
<DD><PRE>
putenv(str)
   String str;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>putenv("ENV=val") は，環境変数 ENV の値を val に設定する。
<DT>【例題】
<DD>環境変数 LANG の値を ja に設定する。</FONT><PRE>
putenv("LANG=ja");
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
<DD></FONT></FONT>
