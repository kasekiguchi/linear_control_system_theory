<H2><A NAME="SECTION000429000000000000000">&#160;</A><A NAME="man_clear">&#160;</A>
<BR>
clear
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>clear - 登録変数の消去および画面上の文字の消去
<DT>【形式】
<DD><PRE>
clear var1, var2, ..., varn;
  
clear;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>clear var は，インタプリタに登録されている大域変数 var を消去する。
clear は，画面上の文字を消去する。
<DT>【例題】
<DD></FONT><PRE>
clear A;
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
