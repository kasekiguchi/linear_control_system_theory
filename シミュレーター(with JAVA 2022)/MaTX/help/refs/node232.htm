<H2><A NAME="SECTION0004228000000000000000">&#160;</A><A NAME="man_system">&#160;</A>
<BR>
system
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>system - OSの命令を実行する
<DT>【形式】
<DD><PRE>
i = system(cmd)
   Integer i;
   String cmd;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>system(cmd)は，文字列 cmd で指定された</FONT><FONT SIZE="-1">OSの命令を実行し，
</FONT><FONT SIZE="-1">OSからの終了コードを返す。
<DT>【例題】
<DD>プロットツール gnuplot を起動する例を次に示す。</FONT><PRE>
system("gnuplot afo.gp");
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
<DD></FONT></FONT>
