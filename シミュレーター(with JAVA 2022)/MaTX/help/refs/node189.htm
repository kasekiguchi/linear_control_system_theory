<H2><A NAME="SECTION0004185000000000000000">&#160;</A><A NAME="man_Rows">&#160;</A>
<BR>
Rows
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>Rows - 行の数
<DT>【形式】
<DD><PRE>
m = Rows(X)
   Integer m;
   (Matrix|Array|Index) X;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>Rows(X)は(行列|配列|指数) X の行の数を返す。
<DT>【例題】
<DD></FONT><PRE>
&gt;&gt; X = [[1 2 3][4 5 6]];
&gt;&gt; m = Rows(X)
m = 2
