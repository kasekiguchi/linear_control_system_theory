<H2><A NAME="SECTION000481000000000000000">&#160;</A><A NAME="man_getenv">&#160;</A>
<BR>
getenv
</H2><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"><FONT SIZE="-1"></FONT></FONT></FONT></FONT></FONT></FONT><DL COMPACT>

<DT>【目的】
<DD>getenv - 環境変数の取得
<DT>【形式】
<DD><PRE>
env = getenv(name)
   String env;
   String str;
</PRE><FONT SIZE="-1"><DT>【詳細】
<DD>getenv(name)は，環境変数 name の値を文字列で返す。
<DT>【例題】
<DD>環境変数 PATH の値を取得する。</FONT><PRE>
disp = getenv("PATH");
</PRE><FONT SIZE="-1"><FONT SIZE="-1"><DT>【参照】
